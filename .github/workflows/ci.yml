name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Read FVM config
        id: fvm
        uses: kuhnroyal/flutter-fvm-config-action@v2
        with:
          path: .fvmrc

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Lint
        run: flutter analyze --fatal-infos

      - name: Test with coverage
        run: flutter test --coverage

      - name: Filter coverage
        run: |
          lcov --ignore-errors unused \
            --remove coverage/lcov.info \
            'lib/main.dart' \
            'lib/**/generated/**' \
            -o coverage/lcov.info

      - name: Check coverage >= 85%
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: ${{ github.workspace }}/coverage/lcov.info
          min_coverage: 85
